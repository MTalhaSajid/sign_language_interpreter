name: sign_language_interpreter
description: "Sign Talk - Real-Time Sign Language Recognition System"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Navigation ───────────────────────────────────
  google_fonts: ^6.1.0
  go_router: ^15.1.1
  provider: ^6.1.4
  cupertino_icons: ^1.0.8

  # ── Storage & Config ──────────────────────────────────
  shared_preferences: ^2.5.3
  package_info_plus: ^8.3.0

  # ── Firebase ──────────────────────────────────────────
  firebase_core: 3.15.2
  firebase_auth: 5.7.0

  # ── Networking & DI ───────────────────────────────────
  dio: ^5.8.0+1
  get_it: ^8.0.3
  connectivity_plus: ^6.1.4
  logger: ^2.5.0

  # ── ML & Camera ───────────────────────────────────────
  tflite_flutter: ^0.12.1
  hand_landmarker: ^2.2.0
  camera: ^0.11.0
  permission_handler: ^11.3.1
  flutter_tts: ^4.0.2
  http: ^1.2.0

  # ── Image ─────────────────────────────────────────────
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.15
  flutter_native_splash: ^2.4.5

flutter_native_splash:
  color: "#080E1C"
  color_dark: "#080E1C"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/model/